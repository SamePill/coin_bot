services:
  db:
    image: mariadb:10.11
    container_name: aegis_db
    restart: always
    [cite_start]env_file: .env   # 💡 .env 파일의 내용을 환경 변수로 주입 
    environment:
      #MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      #MYSQL_DATABASE: ${DB_NAME}
      MARIADB_ROOT_PASSWORD: ${DB_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - ./db_data:/var/lib/mysql

  aegis-bot:
    build: .
    container_name: aegis_v17_bot
    restart: unless-stopped
    depends_on:
      - db
    [cite_start]env_file: .env   # 💡 봇 컨테이너에도 환경 변수 주입 
    environment:
      - TZ=Asia/Seoul