services:
  mariadb:
    image: mariadb:10.11
    container_name: aegis_db
    restart: unless-stopped
    ports:
      - "3305:3305"
    env_file: .env   # 💡 .env 파일의 내용을 환경 변수로 주입 
    environment:
      #MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      #MYSQL_DATABASE: ${DB_NAME}
      MARIADB_ROOT_PASSWORD: ${DB_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
      TZ: Asia/Seoul
    volumes:
      - ./db_data:/var/lib/mysql

# 🛡️ 1. 코어 엔진 (Core Engine)
  core-bot:
    build: .
    container_name: aegis_core
    profiles: ["core"]
    restart: unless-stopped
    depends_on:
      - mariadb
    env_file: .env
    environment:
      - ENGINE_TYPE=CORE
      - MAX_BUDGET=${CORE_MAX_BUDGET}
      - TARGET_SLOTS=2
      - TZ=Asia/Seoul

  # 🏹 2. 헌터 엔진 (Hunter Engine)
  hunter-bot:
    build: .
    container_name: aegis_hunter
    profiles: ["hunter"]
    restart: unless-stopped
    depends_on:
      - mariadb
    env_file: .env
    environment:
      - ENGINE_TYPE=HUNTER
      - MAX_BUDGET=${HUNTER_MAX_BUDGET}
      - TARGET_SLOTS=5
      - TZ=Asia/Seoul

  # 📊 3. 스마트 그리드 엔진 (Smart Grid Engine)
  grid-bot:
    build: .
    container_name: aegis_grid
    profiles: ["grid"]
    restart: unless-stopped
    depends_on:
      - mariadb
    env_file: .env
    environment:
      - ENGINE_TYPE=GRID
      - MAX_BUDGET=${GRID_MAX_BUDGET}
      - TZ=Asia/Seoul

